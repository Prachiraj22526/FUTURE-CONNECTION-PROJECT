<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connection Type Prediction</title>
    <style>
        body {
            background: #121212;
            color: #ffffff;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #1e1e1e;
            padding: 30px;
            width: 420px;
            border-radius: 10px;
            box-shadow: 0 0 15px black;
        }
        h2 {
            text-align: center;
            color: #ff9800;
        }
        label {
            margin-top: 10px;
            display: block;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border-radius: 5px;
            border: none;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background: #ff9800;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #e68900;
        }
        #result {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            color: #00e676;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Connection Type Prediction</h2>

    <label>DIST_CODE</label>
    <input type="number" id="dist">

    <label>BLOCK_CODE</label>
    <input type="number" id="block">

    <label>TARIFF_ID</label>
    <select id="tariff">
        {% for t in tariff_values %}
            <option value="{{ t }}">{{ t }}</option>
        {% endfor %}
    </select>

    <label>SANC_LOAD</label>
    <input type="number" step="0.01" id="load">

    <label>APPPHASE</label>
    <input type="number" id="phase">

    <label>APP_SOURCE</label>
    <select id="source">
        {% for s in source_values %}
            <option value="{{ s }}">{{ s }}</option>
        {% endfor %}
    </select>

    <button onclick="predict()">Predict</button>

    <div id="result"></div>
</div>

<script>
async function predict() {
    const data = {
        DIST_CODE: parseInt(document.getElementById("dist").value),
        BLOCK_CODE: parseInt(document.getElementById("block").value),
        TARIFF_ID: document.getElementById("tariff").value,
        SANC_LOAD: parseFloat(document.getElementById("load").value),
        APPPHASE: parseInt(document.getElementById("phase").value),
        APP_SOURCE: document.getElementById("source").value
    };

    const response = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "x-api-key": "mysecret123"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerHTML =
        result.predicted_connection_type
        ? "Predicted Connection Type: <b>" + result.predicted_connection_type + "</b>"
        : "Error: " + result.error;
}
</script>

</body>
</html>
